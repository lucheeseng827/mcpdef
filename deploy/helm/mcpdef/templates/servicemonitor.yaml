{{- if .Values.serviceMonitor.enabled }}
{{- if not .Values.admin.enabled }}
{{- fail "serviceMonitor.enabled=true requires admin.enabled=true: Prometheus scrapes the admin /metrics port, which is only exposed when admin.enabled." }}
{{- end }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mcpdef.fullname" . }}
  labels:
    {{- include "mcpdef.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "mcpdef.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: admin
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
